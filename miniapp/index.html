<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TopUp Store</title>
<script src="https://telegram.org/js/telegram-web-app.js" defer></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <header class="topbar">
    <div class="user-block">
      <img id="userAvatar" class="avatar" src="https://placehold.co/48x48/2b2f52/ffffff?text=U" alt="">
      <div class="user-meta">
        <span id="userName" class="user-name">Foydalanuvchi</span>
        <span id="userHandle" class="user-handle">@username</span>
      </div>
    </div>
    <div class="coin-pill">
      <span class="coin-dot"></span>
      <span id="coinCount">0</span>
    </div>
  </header>

  <section class="balance-card">
    <span class="balance-label">Balans</span>
    <div class="balance-amount">
      <span id="balanceValue">0</span>
      <span class="balance-currency">so'm</span>
    </div>
    <div class="balance-actions">
      <button class="action-btn" id="btnTopup">
        <span>Hisobni to'ldirish</span>
      </button>
      <button class="action-btn" id="btnPromo">
        <span>Bonus kodlar</span>
      </button>
      <button class="action-btn" id="btnSupport">
        <span>Yordam</span>
      </button>
    </div>
  </section>

  <div class="tabs">
    <button class="tab active" data-tab="games">Oyinlar</button>
    <button class="tab" data-tab="promo">Promokodlar</button>
  </div>

  <section class="grid" id="gamesGrid"></section>

  <section class="promo-panel" id="promoPanel">
    <div class="promo-input-row">
      <input type="text" id="promoInput" placeholder="Promokodni kiriting">
      <button id="promoSubmit">Qollash</button>
    </div>
    <p class="promo-hint">Promokodni kiritib qoshimcha bonus somlarga ega boling.</p>
  </section>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="home">
      <span>Bosh sahifa</span>
    </button>
    <button class="nav-btn" data-view="history">
      <span>Tarix</span>
    </button>
    <button class="nav-btn" data-view="settings">
      <span>Sozlamalar</span>
    </button>
  </nav>

</div>

<div class="sheet-overlay" id="topupOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>Hisobni toldirish</h3>

    <div id="topupStep1">
      <label class="field-label">Summani kiriting (som)</label>
      <input type="number" id="topupAmount" class="field-input" placeholder="Masalan: 20000" min="1000">
      <div class="quick-amounts">
        <button class="quick-amt" data-amt="10000">10 000</button>
        <button class="quick-amt" data-amt="25000">25 000</button>
        <button class="quick-amt" data-amt="50000">50 000</button>
        <button class="quick-amt" data-amt="100000">100 000</button>
      </div>
      <button class="primary-btn" id="topupNext">Davom etish</button>
    </div>

    <div id="topupStep2" class="hidden">
      <p class="pay-instruction">Quyidagi kartaga <b id="payAmountLabel">0 som</b> otkazing:</p>
      <div class="card-box">
        <span id="payCardNumber">**** **** **** ****</span>
        <button id="copyCard" class="copy-btn">Nusxalash</button>
      </div>
      <p class="pay-note">Tolovni amalga oshirgach, pastdagi tugmani bosing.</p>
      <button class="primary-btn" id="confirmPaid">Tolov qildim</button>
      <button class="ghost-btn" id="backStep1">Orqaga</button>
    </div>

    <div id="topupStep3" class="hidden">
      <div class="success-icon">OK</div>
      <p class="success-text">Sorovingiz yuborildi.</p>
      <button class="primary-btn" id="closeSheet">Yopish</button>
    </div>

    <button class="sheet-close" id="topupClose">X</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
