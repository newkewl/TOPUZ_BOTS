<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Up Uz</title>
    <link rel="stylesheet" href="style.css">
    <!-- Telegram Mini App skriptini ulash -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Profil qismi -->
        <div class="profile-section">
            <div class="avatar" id="user-avatar">U</div>
            <div class="user-info">
                <div class="username" id="user-name">Foydalanuvchi</div>
                <div class="user-tag" id="user-tag">@username</div>
            </div>
            <div class="coin-badge">🟡 <span id="user-coins">0</span></div>
        </div>

        <!-- Balans qismi -->
        <div class="balance-card">
            <p class="balance-title">Balans</p>
            <h1 class="balance-amount"><span id="balance-value">0</span> <span class="currency">so'm</span></h1>
            
            <div class="action-buttons">
                <button class="action-btn" id="btn-topup">
                    <span class="icon">💳</span>
                    <span>Hisobni to'ldirish</span>
                </button>
                <button class="action-btn" id="btn-bonus">
                    <span class="icon">📚</span>
                    <span>Bonus kodlar</span>
                </button>
                <button class="action-btn" id="btn-support">
                    <span class="icon">💬</span>
                    <span>Yordam</span>
                </button>
            </div>
        </div>

        <!-- Mahsulotlar bo'limi -->
        <div class="shop-section">
            <h3>O'yinlar va Xizmatlar</h3>
            <div class="games-grid">
                <div class="game-item" onclick="selectGame('pubg')">PUBG Mobile</div>
                <div class="game-item" onclick="selectGame('freefire')">Free Fire</div>
                <div class="game-item" onclick="selectGame('stars')">TG Stars</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
